AWSTemplateFormatVersion: "2010-09-09"
Description: Timetrack static website hosting with S3, CloudFront OAC, ACM, and Route 53.

Parameters:
  DomainName:
    Type: String
    Description: Apex domain for the site, for example timetrack.example.com or example.com.

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Public Route 53 hosted zone ID that manages DomainName.

  IncludeWwwAlias:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Also create and serve www.DomainName.

  SiteBucketName:
    Type: String
    Default: ""
    Description: Optional globally unique S3 bucket name. Leave blank to let CloudFormation generate one.

  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
    Description: CloudFront edge location price class.

Conditions:
  HasCustomBucketName: !Not [!Equals [!Ref SiteBucketName, ""]]
  UseWwwAlias: !Equals [!Ref IncludeWwwAlias, "true"]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If [HasCustomBucketName, !Ref SiteBucketName, !Ref AWS::NoValue]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames: !If
        - UseWwwAlias
        - - !Sub "www.${DomainName}"
        - !Ref AWS::NoValue
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
        - !If
          - UseWwwAlias
          - DomainName: !Sub "www.${DomainName}"
            HostedZoneId: !Ref HostedZoneId
          - !Ref AWS::NoValue

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-s3-oac"
        Description: !Sub "CloudFront access control for ${SiteBucket}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Timetrack static site for ${DomainName}"
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: !Ref PriceClass
        Aliases: !If
          - UseWwwAlias
          - - !Ref DomainName
            - !Sub "www.${DomainName}"
          - - !Ref DomainName
        Origins:
          - Id: TimetrackS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: TimetrackS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}"

  ApexAliasARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  ApexAliasAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAliasARecord:
    Type: AWS::Route53::RecordSet
    Condition: UseWwwAlias
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAliasAAAARecord:
    Type: AWS::Route53::RecordSet
    Condition: UseWwwAlias
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "www.${DomainName}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteUrl:
    Description: Primary HTTPS site URL.
    Value: !Sub "https://${DomainName}"

  WwwUrl:
    Condition: UseWwwAlias
    Description: WWW HTTPS site URL.
    Value: !Sub "https://www.${DomainName}"

  SiteBucket:
    Description: S3 bucket for site files.
    Value: !Ref SiteBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID.
    Value: !Ref SiteDistribution

  CloudFrontDomainName:
    Description: CloudFront distribution domain name.
    Value: !GetAtt SiteDistribution.DomainName

